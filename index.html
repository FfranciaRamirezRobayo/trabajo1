let current=0;
const n=slides.length;

function render(){
  const s=slides[current];
  document.getElementById('prog').style.width=((current+1)/n*100)+'%';

  document.getElementById('slide-area').innerHTML=`
    <div class="slide-hero">
      <div class="slide-num-row">
        <span class="slide-badge">${s.badge}</span>
        <span class="slide-counter-txt">${current+1} de ${n}</span>
      </div>
      <div class="slide-title">${s.title}</div>
      <div class="slide-sub">${s.sub}</div>
      <div style="margin-top:4px">${s.render()}</div>
    </div>
  `;

  const dots=document.getElementById('dots');
  dots.innerHTML='';
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===current?' active':'');
    d.onclick=()=>goTo(i);
    dots.appendChild(d);
  }

  document.getElementById('btn-prev').style.opacity=current===0?'0.3':'1';
  document.getElementById('btn-next').textContent=current===n-1?'Reiniciar ↺':'Siguiente →';
}

function goTo(i){current=i;render()}
function next(){current=current===n-1?0:current+1;render()}
function prev(){if(current>0){current--;render()}}
render();
