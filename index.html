];

let cur=0;
const n=S.length;
const wrap=document.getElementById('wrap');
let sx=0,sy=0;

S.forEach((s,i)=>{
  const d=document.createElement('div');
  d.className='slide'+(i===0?' on':'');
  d.innerHTML=s.h;
  wrap.appendChild(d);
});

function render(){
  document.querySelectorAll('.slide').forEach((el,i)=>el.classList.toggle('on',i===cur));
  document.getElementById('prog').style.width=((cur+1)/n*100)+'%';
  document.getElementById('counter').textContent=(cur+1)+' / '+n;
  const dots=document.getElementById('dots');
  dots.innerHTML='';
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===cur?' on':'');
    d.onclick=()=>{cur=i;render()};
    dots.appendChild(d);
  }
  const pb=document.getElementById('bprev');
  const nb=document.getElementById('bnext');
  pb.style.opacity=cur===0?'0.35':'1';
  nb.textContent=cur===n-1?'↺ Inicio':'Siguiente →';
}

function next(){cur=cur===n-1?0:cur+1;render()}
function prev(){if(cur>0){cur--;render()}}

// Swipe táctil
wrap.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
wrap.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx;
  const dy=Math.abs(e.changedTouches[0].clientY-sy);
  if(Math.abs(dx)>50&&dy<80){dx<0?next():prev()}
},{passive:true});

// Teclado
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next()}
  if(e.key==='ArrowLeft'){e.preventDefault();prev()}
});

render();
</script>
