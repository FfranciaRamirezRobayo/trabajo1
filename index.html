{html:`

<div class="sc">

    <div class="sbox"><div class="snum">+8M</div><div class="slbl">Propiedades horizontales en Colombia</div></div>

{html:`
<div class="topbar"><div class="tbrand"><div class="gdot"></div><span class="tbrand-txt">02 &middot; EL PROBLEMA</span></div><span class="tright">&iquest;Qu&eacute; est&aacute; fallando y a qui&eacute;n afecta?</span></div>

{html:`

{html:`
<div class="topbar"><div class="tbrand"><div class="gdot"></div><span class="tbrand-txt">04 &middot; JUSTIFICACI&Oacute;N</span></div><span class="tright">&iquest;Por qu&eacute; importa esta investigaci&oacute;n?</span></div>

      <div class="jicon">&#127760;</div>
      <div style="flex:1"><div class="jtitle">Social</div><div class="jtext">Cuando una copropiedad tiene problemas financieros, <b>las consecuencias las absorben las familias que viven all&iacute;</b>. El deterioro de infraestructura y zonas comunes desvaloriza el inmueble de cada copropietario. Con el <b>60% de colombianos</b> viviendo en propiedad horizontal, mejorar su gesti&oacute;n tiene impacto social masivo.</div></div>
    </div>

      <div class="jicon">&#127979;</div>

</div>`},

{html:`

let cur=0;
const n=slides.length;
const wrap=document.getElementById('slides-wrap');
slides.forEach((s,i)=>{
  const d=document.createElement('div');
  d.className='slide'+(i===0?' active':'');
  d.id='s'+i;
  d.innerHTML=s.html;
  wrap.appendChild(d);
});

function render(){
  document.querySelectorAll('.slide').forEach((el,i)=>el.classList.toggle('active',i===cur));
  document.getElementById('prog').style.width=((cur+1)/n*100)+'%';
  const dd=document.getElementById('dots');
  dd.innerHTML='';
  for(let i=0;i<n;i++){
    const dot=document.createElement('div');
    dot.className='dot'+(i===cur?' on':'');
    dot.onclick=()=>goTo(i);
    dd.appendChild(dot);
  }
  document.getElementById('bprev').style.opacity=cur===0?'0.3':'1';
  document.getElementById('bnext').textContent=cur===n-1?'Reiniciar \u21BA':'Siguiente \u2192';
  document.getElementById('sinfo').textContent=(cur+1)+' de '+n;
}
function goTo(i){cur=i;render()}
function next(){cur=cur===n-1?0:cur+1;render()}
function prev(){if(cur>0){cur--;render()}}
function toggleFS(){
  if(!document.fullscreenElement){document.documentElement.requestFullscreen();}
  else{document.exitFullscreen();}
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  if(e.key==='ArrowLeft'){e.preventDefault();prev();}
  if(e.key==='f'||e.key==='F'){toggleFS();}
});
render();
</script>
