<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Tesis Francia Ramírez · UNICUCES 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0d0d;font-family:system-ui,-apple-system,sans-serif}

/* LAYOUT FIJO: topbar + contenido + navbar abajo */
.app{display:flex;flex-direction:column;width:100%;height:100vh;height:100dvh}

.topbar{flex-shrink:0;background:#0a0a0a;border-bottom:2px solid #C9A84C33;padding:8px 14px;display:flex;align-items:center;justify-content:space-between}
.tb-l{display:flex;align-items:center;gap:7px}
.gd{width:9px;height:9px;border-radius:50%;background:#C9A84C;flex-shrink:0}
.tb-t{font-size:clamp(9px,2.5vw,13px);font-weight:700;color:#C9A84C;letter-spacing:.05em}
.tb-r{font-size:clamp(8px,2vw,11px);color:#444}

.prog{flex-shrink:0;height:3px;background:#1a1a1a}
.prog-f{height:100%;background:#C9A84C;transition:width .4s}

/* ZONA DE CONTENIDO — ocupa todo el espacio entre topbar y navbar */
.content{flex:1;min-height:0;position:relative;overflow:hidden}
.slide{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .35s;overflow-y:auto;overflow-x:hidden;padding:14px 14px 8px;display:flex;flex-direction:column;gap:10px}
.slide.on{opacity:1;pointer-events:auto}

/* NAVBAR ABAJO — SIEMPRE VISIBLE */
.navbar{flex-shrink:0;background:#080808;border-top:2px solid #C9A84C44;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.nbtn{flex-shrink:0;padding:11px 20px;border-radius:50px;font-size:clamp(13px,3vw,16px);font-weight:800;cursor:pointer;border:none;transition:all .2s}
.nbtn.prev{background:#1e1e1e;color:#C9A84C;border:2px solid #C9A84C55}
.nbtn.next{background:#C9A84C;color:#111}
.nbtn.prev:active{background:#2a2a2a}
.nbtn.next:active{background:#b89040}
.dots{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:center;flex:1}
.dot{width:8px;height:8px;border-radius:50%;background:#2a2a2a;cursor:pointer;transition:all .25s}
.dot.on{background:#C9A84C;width:20px;border-radius:4px}

/* TIPOGRAFÍA */
.h1{font-size:clamp(17px,4.5vw,38px);font-weight:900;color:#fff;line-height:1.15;flex-shrink:0}
.h2{font-size:clamp(10px,2.5vw,14px);color:#C9A84C88;font-style:italic;flex-shrink:0}
.lbl{font-size:clamp(9px,2vw,12px);font-weight:700;color:#C9A84C;letter-spacing:.07em;margin-bottom:5px}
.txt{font-size:clamp(11px,2.5vw,14px);color:rgba(255,255,255,.85);line-height:1.6}
.txt b{color:#fff}

/* CARDS */
.card{background:#171717;border:1px solid #252525;border-radius:12px;padding:11px 13px}
.card.gold{border-color:#C9A84C44;background:#C9A84C09}
.card.acc{border-left:3px solid #C9A84C;border-radius:0 12px 12px 0}
.card.bl{border-left:3px solid #C9A84C;border-radius:0 12px 12px 0;background:#C9A84C06}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}

/* STATS */
.sbox{background:#171717;border:1px solid #252525;border-radius:10px;padding:10px 6px;text-align:center}
.sn{font-size:clamp(22px,5.5vw,44px);font-weight:900;color:#C9A84C;line-height:1}
.sl{font-size:clamp(9px,2vw,12px);color:#555;margin-top:3px;line-height:1.3}

/* LISTAS */
.ul{list-style:none}
.ul li{font-size:clamp(11px,2.5vw,13px);color:rgba(255,255,255,.82);padding:5px 0 5px 15px;position:relative;line-height:1.5;border-bottom:1px solid #1e1e1e}
.ul li:last-child{border-bottom:none}
.ul li:before{content:'';position:absolute;left:2px;top:.72em;width:6px;height:6px;border-radius:50%;background:#C9A84C}

/* MÓDULOS */
.mrow{display:flex;gap:10px;align-items:flex-start;background:#171717;border:1px solid #252525;border-radius:10px;padding:10px 12px}
.mrow.hl{border-color:#C9A84C44;background:#C9A84C08}
.mn{min-width:32px;height:32px;border-radius:8px;background:#C9A84C18;border:1px solid #C9A84C44;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#C9A84C;flex-shrink:0}
.mn.s{background:#C9A84C;color:#111;border-color:#C9A84C}
.mname{font-size:clamp(12px,2.8vw,14px);font-weight:700;color:#fff;margin-bottom:2px}
.mdesc{font-size:clamp(10px,2.2vw,12px);color:#666;line-height:1.4}

/* JUSTIFICACIÓN */
.jrow{display:flex;gap:10px;align-items:flex-start;background:#171717;border:1px solid #252525;border-radius:10px;padding:10px 12px}
.jrow.hl{border-color:#C9A84C44;background:#C9A84C08}
.ji{width:36px;height:36px;border-radius:50%;background:#C9A84C18;border:1px solid #C9A84C33;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ji.s{background:#C9A84C22;border-color:#C9A84C}
.jt{font-size:clamp(11px,2.5vw,14px);font-weight:700;color:#C9A84C;margin-bottom:2px}
.jx{font-size:clamp(10px,2.2vw,12px);color:rgba(255,255,255,.78);line-height:1.5}

/* TIMELINE */
.tlr{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #1c1c1c;align-items:flex-start}
.tlr:last-child{border:none}
.tlc{min-width:28px;height:28px;border-radius:50%;background:#C9A84C18;border:1px solid #C9A84C44;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#C9A84C;flex-shrink:0}
.tlc.now{background:#C9A84C;color:#111}
.tlp{font-size:clamp(10px,2.2vw,13px);font-weight:700;color:#C9A84C}
.tlt{font-size:clamp(9px,2vw,12px);color:rgba(255,255,255,.7)}

/* PRESUPUESTO */
.pr{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1f1f1f;font-size:clamp(10px,2.2vw,13px)}
.pr:last-child{border:none;font-weight:700;padding-top:7px}
.pr span:first-child{color:rgba(255,255,255,.7)}
.pr span:last-child{color:#fff}

/* ESPECIALES */
.qbox{background:#C9A84C;border-radius:12px;padding:13px 16px}
.qbox p{font-size:clamp(12px,2.8vw,16px);color:#111;font-weight:700;line-height:1.6;text-align:center}
.pbox{background:#C9A84C0d;border:1px solid #C9A84C33;border-radius:12px;padding:12px 16px;text-align:center}
.pbox p{font-size:clamp(10px,2.2vw,13px);color:#C9A84C;font-style:italic;line-height:1.6}

/* PORTADA */
.cover{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;padding:10px}
.cpre{font-size:clamp(10px,2.5vw,14px);font-weight:700;color:#C9A84C;letter-spacing:.15em}
.ctitle{font-size:clamp(22px,6vw,56px);font-weight:900;color:#fff;line-height:1.1}
.ctitle span{color:#C9A84C}
.csub{font-size:clamp(12px,2.8vw,18px);color:rgba(255,255,255,.4);line-height:1.6}
.cmetas{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.cm{background:#171717;border:1px solid #252525;border-radius:10px;padding:8px 14px;font-size:clamp(10px,2.2vw,13px);color:rgba(255,255,255,.65)}
.cm b{color:#C9A84C}

/* CIERRE */
.cierre{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;padding:10px}
.ctag{display:inline-block;font-size:clamp(10px,2.2vw,13px);font-weight:700;letter-spacing:.1em;padding:5px 16px;border-radius:30px;background:#C9A84C18;color:#C9A84C;border:1px solid #C9A84C44}
.cfrase{font-size:clamp(16px,4vw,36px);font-weight:900;color:#fff;line-height:1.3}
.cfrase span{color:#C9A84C}
</style>
</head>

  d.className='slide'+(i===0?' on':'');
  d.innerHTML=s.h;
  wrap.appendChild(d);
});

function render(){
  document.querySelectorAll('.slide').forEach((el,i)=>el.classList.toggle('on',i===cur));
  // Scroll al top de cada slide
  const active=document.querySelector('.slide.on');
  if(active)active.scrollTop=0;
  document.getElementById('prog').style.width=((cur+1)/n*100)+'%';
  document.getElementById('tb-title').textContent=S[cur].t;
  document.getElementById('tb-sub').textContent=S[cur].s;
  const dots=document.getElementById('dots');
  dots.innerHTML='';
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===cur?' on':'');
    d.onclick=()=>{cur=i;render()};
    dots.appendChild(d);
  }
  document.getElementById('bprev').style.opacity=cur===0?'0.35':'1';
  document.getElementById('bnext').textContent=cur===n-1?'↺ Inicio':'Siguiente →';
}

function next(){cur=cur===n-1?0:cur+1;render()}
function prev(){if(cur>0){cur--;render()}}

wrap.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
wrap.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx;
  const dy=Math.abs(e.changedTouches[0].clientY-sy);
  if(Math.abs(dx)>55&&dy<80){dx<0?next():prev()}
},{passive:true});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next()}
  if(e.key==='ArrowLeft'){e.preventDefault();prev()}
});

render();
</script>
</body>
</html>
